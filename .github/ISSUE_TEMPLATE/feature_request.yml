name: Feature Request / 功能请求
description: 建议新功能或改进
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 你希望增加什么功能？
    validations:
      required: true
  - type: dropdown
    id: role
    attributes:
      label: 目标用户角色
      options:
        - BCBA / 总督导
        - 分督导 / RBT
        - 一线教师
        - 机构管理者
        - 技术开发者
    validations:
      required: true
  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 在什么临床场景下需要这个功能？
  - type: textarea
    id: alternatives
    attributes:
      label: 现有替代方案
      description: 你目前是如何解决这个需求的？
